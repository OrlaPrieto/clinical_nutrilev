@if (pwaService.showInstallBanner()) {
  <div class="fixed bottom-4 left-4 right-4 md:left-1/2 md:-translate-x-1/2 md:right-auto md:w-[400px] z-[100] bg-white dark:bg-[#1a1a1a] rounded-2xl shadow-nutri border border-nutri-rose/20 p-3 sm:p-4 flex items-center justify-between gap-2 sm:gap-4 animate-fade-up">
    <div class="flex items-center gap-2 sm:gap-3 overflow-hidden">
      <img src="images/nutrition-icon.png" alt="Nutrilev Logo" class="w-8 h-8 sm:w-10 sm:h-10 object-cover shrink-0" />
      <div class="flex flex-col min-w-0">
        <span class="font-semibold text-sm text-nutri-text dark:text-slate-200 truncate">Instalar Nutrilev</span>
        <span class="text-[10px] sm:text-xs text-nutri-text/70 dark:text-slate-400 truncate">Acceso rápido y offline</span>
      </div>
    </div>
    <div class="flex items-center gap-1 sm:gap-2 shrink-0">
      <button (click)="pwaService.dismissBanner()" class="p-1 sm:p-2 text-nutri-text/50 hover:text-nutri-text transition-colors">
        <span class="material-symbols-rounded text-lg">close</span>
      </button>
      @if (pwaService.isIos) {
         <div class="text-[9px] sm:text-[10px] text-nutri-text/70 dark:text-slate-400 text-right pr-1 sm:pr-2 leading-tight">
            Toca <span class="material-symbols-rounded !text-[12px] sm:!text-[14px] align-middle">ios_share</span> y luego<br>"Añadir a inicio"
         </div>
      } @else {
         <button (click)="pwaService.installApp()" class="bg-[#ff6b9b] text-white text-xs sm:text-sm font-semibold px-3 py-1.5 sm:px-4 sm:py-2 rounded-xl hover:bg-[#ff6b9b]/90 transition-colors shadow-pink-soft shrink-0">
           Instalar
         </button>
      }
    </div>
  </div>
}
