<div class="bg-white dark:bg-[#111111] p-4 rounded-2xl border border-nutri-rose/5 dark:border-white/5 shadow-sm hover:border-nutri-rose/20 dark:hover:border-white/10 transition-all duration-300 h-full flex flex-col justify-center">
  <span class="text-[9px] font-bold text-nutri-rose/40 dark:text-nutri-rose/60 uppercase tracking-widest block mb-1">
    {{ label() }}
  </span>
  
  @if (!isEditing()) {
    <p class="text-md font-bold text-nutri-text dark:text-slate-200">
      {{ value() ? (type() === 'date' ? (value() | date:'dd/MM/yyyy') : value()) : '---' }}
      @if (value() && suffix()) {
        <span class="text-[10px] text-nutri-text/60 dark:text-slate-500 ml-1 font-medium">{{ suffix() }}</span>
      }
    </p>
  } @else {
    <app-a-input 
      [type]="type()"
      [value]="value()"
      [placeholder]="placeholder()"
      [showSpinner]="showSpinner()"
      [inputClass]="'!h-8 !border-none !bg-nutri-rose/5 dark:!bg-white/5 !px-2 !font-bold !text-sm dark:!text-slate-100'"
      (valueChange)="onValueChange($event)">
    </app-a-input>
  }
</div>
