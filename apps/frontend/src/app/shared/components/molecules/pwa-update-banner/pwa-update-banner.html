@if (updateService.showUpdateBanner()) {
  <div class="fixed bottom-4 left-4 right-4 md:left-1/2 md:-translate-x-1/2 md:right-auto md:w-[420px] z-[110] bg-white dark:bg-[#1a1a1a] rounded-2xl shadow-nutri border border-emerald-500/20 p-3 sm:p-4 flex items-center justify-between gap-2 sm:gap-4 animate-fade-up">
    <div class="flex items-center gap-2 sm:gap-3 overflow-hidden">
      <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-xl bg-emerald-500/10 flex items-center justify-center text-emerald-500 shrink-0">
        <span class="material-symbols-rounded text-lg sm:text-xl">update</span>
      </div>
      <div class="flex flex-col min-w-0">
        <span class="font-semibold text-sm text-nutri-text dark:text-slate-200 truncate">Nueva versión disponible</span>
        <span class="text-[10px] sm:text-xs text-nutri-text/70 dark:text-slate-400 truncate">Actualiza para ver los cambios</span>
      </div>
    </div>
    <div class="flex items-center gap-1 sm:gap-2 shrink-0">
      <button (click)="updateService.dismissBanner()" class="p-1 sm:p-2 text-nutri-text/50 hover:text-nutri-text transition-colors" aria-label="Cerrar aviso">
        <span class="material-symbols-rounded text-lg">close</span>
      </button>
      <button (click)="updateService.activateUpdate()" class="bg-emerald-500 text-white text-xs sm:text-sm font-semibold px-3 py-1.5 sm:px-4 sm:py-2 rounded-xl hover:bg-emerald-600 transition-colors shadow-lg shadow-emerald-500/10 shrink-0">
        Actualizar
      </button>
    </div>
  </div>
}
