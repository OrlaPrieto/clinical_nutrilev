<div class="appointment-container">
  <!-- Header -->
  <div class="appointment-header px-8 py-6 flex items-center justify-between border-b border-nutri-rose/10">
    <div class="header-content">
      <h2 class="text-2xl font-bold italic text-nutri-rose serif">Agendar Cita</h2>
      <div class="flex items-center gap-2">
        <span class="text-[10px] font-black uppercase tracking-[0.2em] text-nutri-text/50">Para:</span>
        <span class="text-[10px] font-black uppercase tracking-[0.2em] text-nutri-text/60">{{ patientName }}</span>
      </div>
    </div>
    <app-a-button (onClick)="closed.emit()" variant="ghost" icon="close" size="md"
                customClass="!w-10 !h-10 !rounded-2xl !bg-nutri-bg !border !border-nutri-rose/10 !text-nutri-text/60 hover:!text-nutri-rose hover:!border-nutri-rose/30 transition-all active:scale-95 group">
    </app-a-button>
  </div>

  <div class="appointment-body flex-1 overflow-visible p-8">
    <div class="selection-grid grid grid-cols-1 lg:grid-cols-[1.2fr,1fr] gap-8">
      
      <!-- Calendar Section -->
      <div class="space-y-4">
        <h3 class="text-[9px] font-black text-nutri-text/50 uppercase tracking-[0.2em] mb-2 px-2">1. Selecciona Fecha</h3>
        <app-a-calendar [selected]="selectedDate" (selectedChange)="selectedDate = $event"></app-a-calendar>
      </div>

      <!-- Form Section -->
      <div class="flex flex-col gap-6">
        
        <!-- Time Section -->
        <div class="space-y-4">
          <h3 class="text-[9px] font-black text-nutri-text/50 uppercase tracking-[0.2em] px-2 text-center lg:text-left">2. Horario e Información</h3>
          
          <div class="bg-white p-6 rounded-3xl border border-nutri-rose/10 shadow-sm space-y-4">
            <div class="grid grid-cols-2 gap-4">
              <app-a-select label="Inicio" [value]="startTime" [options]="timeSlots" (valueChange)="startTime = $event" icon="schedule"></app-a-select>
              <app-a-select label="Fin" [value]="endTime" [options]="timeSlots" (valueChange)="endTime = $event" [disabled]="!startTime"></app-a-select>
            </div>

            <div class="grid grid-cols-2 gap-4">
              <app-a-input label="Costo" type="number" [value]="cost" (valueChange)="cost = $event" icon="payments" placeholder="400"></app-a-input>
              <app-a-input label="# Cita" [value]="appointmentNumber" (valueChange)="appointmentNumber = $event" icon="tag" placeholder="1/4"></app-a-input>
            </div>
          </div>
        </div>

        <!-- Selection Summary Card -->
        @if (selectedDate && startTime) {
          <div class="bg-nutri-rose/5 border border-nutri-rose/20 p-5 rounded-3xl animate-fade-up">
            <div class="flex items-start gap-4">
              <div class="w-10 h-10 rounded-2xl bg-nutri-rose/10 flex items-center justify-center text-nutri-rose">
                <app-a-icon name="event_available"></app-a-icon>
              </div>
              <div class="space-y-1">
                <p class="text-[8px] font-black text-nutri-rose uppercase tracking-widest">Resumen de Selección</p>
                <p class="text-[11px] font-bold text-nutri-text leading-tight">{{ selectionSummary }}</p>
                @if (cost) {
                  <p class="text-[9px] font-medium text-nutri-text/60 italic">Costo estimado: ${{ cost }} MXN</p>
                }
              </div>
            </div>
          </div>
        }

        @if (errorMessage) {
          <div class="bg-rose-50 border border-rose-200 p-4 rounded-2xl flex items-center gap-3 text-rose-600 animate-shake">
            <app-a-icon name="error" customClass="text-lg"></app-a-icon>
            <span class="text-[11px] font-bold">{{ errorMessage }}</span>
          </div>
        }
      </div>
    </div>
  </div>

  <!-- Actions -->
  <div class="appointment-footer px-8 py-6 bg-nutri-bg/50 border-t border-nutri-rose/10 flex items-center justify-end gap-4">
    <app-a-button variant="ghost" label="Cancelar" size="md" (onClick)="closed.emit()" [disabled]="loading"></app-a-button>
    <app-a-button [disabled]="!isFormValid || loading" [loading]="loading" (onClick)="onSchedule()" 
                label="Confirmar Cita" icon="check_circle" variant="primary" size="lg"
                customClass="!min-w-[200px] !h-14 !shadow-lg !shadow-nutri-rose/20">
    </app-a-button>
  </div>
</div>
