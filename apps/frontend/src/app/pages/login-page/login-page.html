<div class="min-h-screen bg-nutri-bg dark:bg-[#050505] flex items-center justify-center p-6 selection:bg-nutri-rose/20 transition-colors duration-700 relative overflow-hidden">
    <!-- Animated Branding Background -->
    <div class="login-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        
        <!-- Glass shards for depth -->
        <div class="absolute top-[20%] left-[5%] w-16 h-16 sm:w-32 sm:h-32 bg-white/10 backdrop-blur-md rounded-2xl sm:rounded-3xl rotate-12 animate-float opacity-40"></div>
        <div class="absolute bottom-[20%] right-[10%] w-24 h-24 sm:w-48 sm:h-48 bg-white/5 backdrop-blur-lg rounded-full -rotate-12 animate-float opacity-30" style="animation-delay: 2s"></div>
    </div>

    <!-- Theme Toggle -->
    <button (click)="themeService.toggleTheme()" 
            class="fixed top-6 right-6 w-10 h-10 rounded-full flex items-center justify-center transition-all duration-300 bg-white/10 dark:bg-white/5 hover:bg-white/20 text-nutri-text/30 dark:text-white/40 hover:text-nutri-rose dark:hover:text-nutri-rose backdrop-blur-sm shadow-sm ring-1 ring-black/5 dark:ring-white/5 z-50">
        <app-a-icon [name]="themeService.isDarkMode() ? 'light_mode' : 'dark_mode'" size="20px"></app-a-icon>
    </button>

    <div class="relative z-10 w-full flex justify-center">
        <app-o-login-card [errorMessage]="errorMessage"></app-o-login-card>
    </div>
</div>
