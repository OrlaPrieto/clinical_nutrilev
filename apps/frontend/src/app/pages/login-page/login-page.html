<div class="min-h-screen bg-nutri-bg dark:bg-[#080808] flex items-center justify-center p-6 selection:bg-nutri-rose/20 transition-colors duration-700">
    <!-- Theme Toggle -->
    <button (click)="themeService.toggleTheme()" 
            class="fixed top-6 right-6 w-10 h-10 rounded-full flex items-center justify-center transition-all duration-300 bg-white/10 dark:bg-white/5 hover:bg-white/20 text-nutri-text/30 dark:text-white/40 hover:text-nutri-rose dark:hover:text-nutri-rose backdrop-blur-sm shadow-sm ring-1 ring-black/5 dark:ring-white/5">
        <app-a-icon [name]="themeService.isDarkMode() ? 'light_mode' : 'dark_mode'" size="20px"></app-a-icon>
    </button>

    <app-o-login-card [errorMessage]="errorMessage"></app-o-login-card>
    
    <div class="fixed bottom-6 text-[10px] font-bold text-nutri-text/10 dark:text-white/5 uppercase tracking-[0.4em] pointer-events-none">
        v{{version}} · Nutrilev Premium Health
    </div>
</div>
